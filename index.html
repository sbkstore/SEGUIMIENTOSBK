<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THISDRUGS | Tracking Terminal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #0a0b0d; --surface: #14161a; --accent: #ffffff;
            --border: rgba(255, 255, 255, 0.08); --success: #02c076; --text-secondary: #848e9c;
        }
        body { background: var(--bg-deep); color: #eaeaea; font-family: 'Inter', sans-serif; min-height: 100vh; margin: 0; }
        .navbar { background: rgba(10, 11, 13, 0.98); border-bottom: 1px solid var(--border); padding: 15px 0; }
        .navbar-brand { font-weight: 800; letter-spacing: 2px; color: var(--accent) !important; text-decoration: none; }
        
        .container-main { display: flex; align-items: center; justify-content: center; padding: 40px 20px; }
        .tracking-card { width: 100%; max-width: 600px; background: var(--surface); border: 1px solid var(--border); border-radius: 24px; padding: 40px; box-shadow: 0 20px 40px rgba(0,0,0,0.5); }
        
        .form-control { background: var(--bg-deep) !important; border: 1px solid var(--border) !important; color: #fff !important; padding: 14px; border-radius: 12px; text-align: center; font-weight: 700; }
        .btn-track { background: var(--accent); color: var(--bg-deep); font-weight: 800; padding: 14px; border-radius: 12px; border: none; width: 100%; margin-top: 15px; text-transform: uppercase; cursor: pointer; }
        
        /* Tracking Steps */
        .progress-wrapper { position: relative; margin: 50px 0 30px; }
        .progress-line { position: absolute; top: 25px; left: 0; width: 100%; height: 2px; background: var(--border); z-index: 1; }
        .progress-line-fill { position: absolute; top: 25px; left: 0; width: 0%; height: 2px; background: var(--success); z-index: 2; transition: 1.2s ease; box-shadow: 0 0 15px var(--success); }
        .steps { display: flex; justify-content: space-between; position: relative; z-index: 3; }
        .step { width: 55px; text-align: center; }
        .circle { width: 50px; height: 50px; background: var(--bg-deep); border: 2px solid var(--border); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: var(--text-secondary); transition: 0.5s; margin-bottom: 8px; font-size: 1.2rem; }
        .step.active .circle { background: var(--success); border-color: var(--success); color: var(--bg-deep); box-shadow: 0 0 20px rgba(2, 192, 118, 0.3); }
        .label { font-size: 0.6rem; font-weight: 800; color: var(--text-secondary); text-transform: uppercase; }
        .step.active .label { color: #fff; }
        
        /* Info Panel */
        .info-panel { background: rgba(255,255,255,0.02); border: 1px solid var(--border); border-radius: 16px; padding: 20px; margin-top: 25px; }
        .info-row { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 0.85rem; }
        .info-label { color: var(--text-secondary); font-weight: 600; }
        .info-value { color: #fff; font-weight: 700; }
    </style>
</head>
<body>

<nav class="navbar"><div class="container text-center"><a class="navbar-brand mx-auto" href="#">THISDRUGS.</a></div></nav>

<div class="container-main">
    <div class="tracking-card">
        <div id="searchSection">
            <div class="text-center mb-4">
                <i class="bi bi-shield-lock-fill" style="font-size: 2.5rem;"></i>
                <h4 class="fw-bold mt-2">RASTREO DE PEDIDO</h4>
                <p class="text-secondary small">Introduzca su código único de seguimiento</p>
            </div>
            <input type="text" id="codigoInput" class="form-control mb-3" placeholder="EJ: TD-1001">
            <button class="btn-track" onclick="iniciarSeguimiento()">VER ESTADO</button>
        </div>

        <div id="trackingUI" style="display:none;">
            <div class="text-center mb-4">
                <h5 id="statusText" class="fw-bold px-3">Sincronizando...</h5>
            </div>

            <div class="progress-wrapper">
                <div class="progress-line"></div>
                <div class="progress-line-fill" id="bar"></div>
                <div class="steps">
                    <div class="step" id="s1"><div class="circle"><i class="bi bi-credit-card"></i></div><div class="label">Pago</div></div>
                    <div class="step" id="s2"><div class="circle"><i class="bi bi-gear-wide-connected"></i></div><div class="label">Packing</div></div>
                    <div class="step" id="s3"><div class="circle"><i class="bi bi-truck"></i></div><div class="label">Ruta</div></div>
                    <div class="step" id="s4"><div class="circle"><i class="bi bi-house-check"></i></div><div class="label">Entrega</div></div>
                </div>
            </div>

            <div class="info-panel">
                <div class="info-row"><span class="info-label">Fecha del Pedido:</span> <span class="info-value" id="resFecha"></span></div>
                <div class="info-row"><span class="info-label">Hora Registro:</span> <span class="info-value" id="resHora"></span></div>
                <div class="info-row" style="flex-direction: column; border-top: 1px solid var(--border); padding-top: 10px;">
                    <span class="info-label mb-2">Detalles del Despacho:</span>
                    <span class="info-value" style="color: var(--text-secondary); font-size: 0.8rem; line-height: 1.4;" id="resDetalles"></span>
                </div>
            </div>
            <button class="btn btn-sm btn-link text-secondary w-100 mt-3 text-decoration-none" onclick="location.reload()">NUEVA CONSULTA</button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script>
    /* ==========================================================
       MODIFICA LA INFORMACIÓN DE TUS PEDIDOS AQUÍ ABAJO
       ========================================================== */
    const BASE_DE_DATOS = {
        "TD-4580": { 
            "estado": 1, 
            "texto": "Pago verificado. El protocolo de preparación se ha iniciado.",
            "fecha": "19/04/2026",
            "hora": "02:17 AM",
            "detalles": "RUCU CUCU X5 UNIDADES" 
        },
        "TD-7755": {
            "estado": 3,
            "texto": "Despachado. El agente de logística está en camino a tu ubicación.",
            "fecha": "19/04/2026",
            "hora": "14:30 PM",
            "detalles": "RUCU CUCU X5 UNIDADES"
        },
        "ADMIN-TEST": {
            "estado": 4,
            "texto": "Protocolo finalizado. El paquete ha sido entregado con éxito.",
            "fecha": "22/04/2026",
            "hora": "10:00 AM",
            "detalles": "entrega finalizada."
        }
    };
    /* ========================================================== */

    function iniciarSeguimiento() {
        const cod = document.getElementById("codigoInput").value.trim().toUpperCase();
        const pedido = BASE_DE_DATOS[cod];

        if (!pedido) {
            Swal.fire({ 
                icon: 'error', 
                title: 'CÓDIGO INVÁLIDO', 
                text: 'No se encontraron registros bajo ese identificador.', 
                background: '#14161a', 
                color: '#fff',
                confirmButtonColor: '#fff',
                confirmButtonText: '<span style="color:#000">OK</span>'
            });
            return;
        }

        // Mostrar Interfaz
        document.getElementById("searchSection").style.display = "none";
        document.getElementById("trackingUI").style.display = "block";
        
        // Cargar Datos
        document.getElementById("statusText").innerText = pedido.texto;
        document.getElementById("resFecha").innerText = pedido.fecha;
        document.getElementById("resHora").innerText = pedido.hora;
        document.getElementById("resDetalles").innerText = pedido.detalles;

        // Activar Pasos
        const steps = ["s1", "s2", "s3", "s4"];
        steps.forEach(s => document.getElementById(s).classList.remove("active"));
        for (let i = 0; i < pedido.estado; i++) {
            document.getElementById(steps[i]).classList.add("active");
        }

        // Animar Barra
        const width = ((pedido.estado - 1) / 3) * 100;
        setTimeout(() => {
            document.getElementById("bar").style.width = Math.max(0, width) + "%";
        }, 150);
    }
</script>
</body>
</html>
